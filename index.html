<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALYX - Espace Officiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #161b22;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #30363d;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 30px;
        }
        .btn-substack {
            display: inline-block;
            background-color: #ff5419;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>REALYX</h1>
        <p>Analyses indépendantes, enquêtes et publications.</p>
        <a href="https://realyx.substack.com" class="btn-substack" target="_blank">Accéder à la Newsletter</a>
    </div>

</body>
</html>
